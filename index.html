<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Set the favicon from the cached uploaded logo before paint, so a reload
         doesn't flash the default favicon. -->
    <script>
      try {
        var b = JSON.parse(localStorage.getItem('branding'));
        if (b && b.logo) {
          var l = document.querySelector("link[rel~='icon']") || document.createElement('link');
          l.rel = 'icon';
          l.href = b.logo;
          document.head.appendChild(l);
        }
      } catch (e) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7B1530" />

    <!-- Base metadata (fallback for crawlers/social bots before JS runs;
         per-page values are set dynamically via react-helmet). -->
    <title>ProEase Global — Premium Indian Ethnic Wear</title>
    <meta name="description" content="ProEase Global — premium, handcrafted Indian ethnic wear. Shop sarees, kurtas, co-ords and more, with worldwide shipping." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ProEase Global" />
    <meta property="og:title" content="ProEase Global — Premium Indian Ethnic Wear" />
    <meta property="og:description" content="Premium, handcrafted Indian ethnic wear with worldwide shipping." />
    <meta property="og:image" content="/favicon.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ProEase Global — Premium Indian Ethnic Wear" />
    <meta name="twitter:description" content="Premium, handcrafted Indian ethnic wear with worldwide shipping." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"> </script>
  </body>
</html>
